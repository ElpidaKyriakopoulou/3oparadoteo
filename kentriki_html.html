<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Partnerships Inbox | AUEB Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="kentriki_css.css">
</head>
<body>

<div class="container-fluid">
    <header class="py-3 mb-4 border-bottom border-secondary">
        <h1 class="h2 text-white">Partnerships Inbox</h1>
    </header>

    <div class="row g-4 mb-4">
        <div class="col-xl-8">
            <div class="chart-container shadow">
                <canvas id="activityChart"></canvas>
            </div>
        </div>
        <div class="col-xl-4">
            <div class="stat-card shadow" id="stats-panel">
                <h5>Συνολικά Αιτήματα</h5>
                <h2 class="display-5 fw-bold">124</h2>
                <p>+12% από την προηγούμενη εβδομάδα</p>
            </div>
        </div>
    </div>

    <div class="table-container shadow-lg">
        <h4 class="mb-4">Προτάσεις Συνεργασίας</h4>
        <div class="table-responsive">
                <table class="table table-dark table-hover table-borderless align-middle mb-0">
                <thead>
                    <tr>
                        <th scope="col">Εταιρεία</th>
                        <th scope="col">Τύπος</th>
                        <th scope="col">Ημερομηνία</th>
                        <th scope="col">Κατάσταση</th>
                        <th scope="col">Ενέργειες</th>
                    </tr>
                </thead>
                <tbody id="requestsBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="kentriki_js.js"></script>
</body>
</html>
