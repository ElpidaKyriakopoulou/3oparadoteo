<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Δημιουργία Status</title>

  <link rel="stylesheet" href="kentriki_css.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html, body {
      background: #f5f7fb !important;
      color: #000 !important;
    }

    .container {
      background: transparent !important;
    }

    .table-container {
      background: #ffffff !important;
      padding: 20px;
      border-radius: 10px;
    }

    textarea, select {
      background: #fff !important;
      color: #000 !important;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <div class="container py-5">
    <h1 class="mb-4">Δημιουργία Status Αιτήματος</h1>

    <div class="table-container">
      <h3 id="companyName"></h3>

      <p class="text-muted">
        Δημιουργία αρχικής κατάστασης για το αίτημα.
      </p>

      <hr>

      <p><strong>Τύπος:</strong> <span id="requestType"></span></p>
      <p><strong>Ημερομηνία:</strong> <span id="requestDate"></span></p>
      <p><strong>Email:</strong> <span id="requestEmail"></span></p>

      <p><strong>Περιγραφή αιτήματος:</strong></p>
      <p id="requestDescription"></p>

      <hr>

      <label for="initialStatus" class="form-label">Αρχικό Status</label>
      <select id="initialStatus" class="form-select">
        <option value="">-- Επιλογή αρχικού status --</option>
        <option value="Προς Έγκριση">Προς Έγκριση</option>
        <option value="Σε Επεξεργασία">Σε Επεξεργασία</option>
        <option value="Χρειάζονται αλλαγές">Χρειάζονται αλλαγές</option>
      </select>

      <div class="mt-4">
        <label for="initialComment" class="form-label">Αρχικό σχόλιο</label>
        <textarea id="initialComment" class="form-control" rows="4"></textarea>
      </div>

      <button class="btn btn-primary mt-4" onclick="createStatus()">
        Δημιουργία Status
      </button>

      <a href="kentriki_html.html" class="btn btn-outline-dark mt-4 ms-2">
        Ακύρωση
      </a>
    </div>
  </div>

  <script src="create_status.js"></script>
</body>
</html>
