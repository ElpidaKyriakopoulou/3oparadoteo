<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Προεπισκόπηση Αιτήματος</title>

  <link rel="stylesheet" href="kentriki_css.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container py-5">
    <h1 class="mb-4">Προεπισκόπηση Αιτήματος</h1>

    <div class="table-container">
      <h3 id="companyName"></h3>

      <p><strong>Τύπος:</strong> <span id="requestType"></span></p>
      <p><strong>Ημερομηνία:</strong> <span id="requestDate"></span></p>
      <p><strong>Email:</strong> <span id="requestEmail"></span></p>
      <p><strong>Περιγραφή:</strong></p>
      <p id="requestDescription"></p>

      <p>
        <strong>Τρέχον status:</strong>
        <span id="requestStatus" class="badge"></span>
      </p>

      <hr>

      <h4>Αλλαγή Status</h4>

      <div class="d-flex gap-2 flex-wrap mt-3">
        <button class="btn btn-warning" onclick="changeStatus('Προς Έγκριση')">Προς Έγκριση</button>
        <button class="btn btn-success" onclick="changeStatus('Εγκρίθηκε')">Εγκρίθηκε</button>
        <button class="btn btn-danger" onclick="changeStatus('Απορρίφθηκε')">Απορρίφθηκε</button>
        <button class="btn btn-info" onclick="changeStatus('Χρειάζονται αλλαγές')">Χρειάζονται αλλαγές</button>
      </div>

      <div class="mt-4">
        <label for="comment" class="form-label">Σχόλιο προς τον οργανισμό</label>
        <textarea id="comment" class="form-control" rows="4"></textarea>
      </div>

      <button class="btn btn-primary mt-3" onclick="notifyOrganization()">
        Αποστολή ενημέρωσης
      </button>

      <a href="kentriki_html.html" class="btn btn-outline-light mt-3 ms-2">
        Επιστροφή
      </a>
    </div>
  </div>

  <script src="request_preview.js"></script>
</body>
</html>
