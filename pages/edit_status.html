<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Προβολή / Διαχείριση Αιτήματος</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../style/style.css">
  
</head>

<body>
  <div class="container py-5">
    <h1 class="mb-4">Προβολή / Διαχείριση Αιτήματος</h1>

    <div class="table-container">
      <h3 id="companyName"></h3>

      <p><strong>Τύπος:</strong> <span id="requestType"></span></p>
      <p><strong>Ημερομηνία:</strong> <span id="requestDate"></span></p>
      <p><strong>Email:</strong> <span id="requestEmail"></span></p>

      <p><strong>Περιγραφή:</strong></p>
      <p id="requestDescription"></p>

      <p>
        <strong>Τρέχον Status:</strong>
        <span id="requestStatus" class="badge"></span>
      </p>

      <hr>

      <h4>Επεξεργασία Status</h4>

      <div class="d-flex gap-2 flex-wrap mt-3">
        <button class="btn btn-warning" onclick="updateStatus('Προς Έγκριση')">Προς Έγκριση</button>
        <button class="btn btn-info" onclick="updateStatus('Σε Επεξεργασία')">Σε Επεξεργασία</button>
        <button class="btn btn-secondary" onclick="updateStatus('Χρειάζονται αλλαγές')">Χρειάζονται αλλαγές</button>
        <button class="btn btn-success" onclick="updateStatus('Εγκρίθηκε')">Εγκρίθηκε</button>
        <button class="btn btn-danger" onclick="updateStatus('Απορρίφθηκε')">Απορρίφθηκε</button>
      </div>

      <div class="field mt-4">
                <label>Σχόλιο προς τον οργανισμό</label>
                <textarea id="comment" rows="4"></textarea>
      </div>

      <button class="btn btn-primary mt-3" onclick="sendUpdate()">
        Αποστολή ενημέρωσης
      </button>

      <a href="kentriki_html.html" class="btn btn-outline-dark mt-3 ms-2">
        Επιστροφή
      </a>
    </div>
  </div>

  <script src="edit_status.js"></script>
</body>
</html>
