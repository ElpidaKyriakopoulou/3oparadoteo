<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Υποβολή Αιτήματος Συνεργασίας</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body data-page="submission">

<div class="header">
    <h1 class="display-5 fw-bold text-white">Υποβολή Αιτήματος</h1>
    <p class="text-white-50">Συμπληρώστε τα στοιχεία της πρότασής σας</p>
</div>

<div class="card shadow-lg">

    <div class="section-title">Τύπος Ανάρτησης</div>
    <div class="row g-3 mb-4">
        <div class="col-6">
            <div class="type-card text-center" id="postEvent" onclick="selectPostType('event')">
                <span class="d-block fs-2">📅</span>
                <span class="card-label">Εκδήλωση</span>
            </div>
        </div>
        <div class="col-6">
            <div class="type-card text-center" id="postJob" onclick="selectPostType('job')">
                <span class="d-block fs-2">💼</span>
                <span class="card-label">Θέση Εργασίας</span>
            </div>
        </div>
    </div>

    <form id="mainForm">
        <!-- Κοινό Πεδίο για όλους -->
        <div class="field">
            <label for="title">Τίτλος</label>
            <input type="text" id="title" placeholder="π.χ. Career Day ή Senior Developer" required>
        </div>

        <!-- ΕΝΟΤΗΤΑ ΕΚΔΗΛΩΣΗΣ -->
        <div id="eventFields" style="display: none;">
            <div class="section-title">Στοιχεία Εκδήλωσης</div>
            <div class="field">
                <label for="banner">Banner Εκδήλωσης (Visual)</label>
                <input type="file" id="banner" class="form-control file-input">
            </div>
            <div class="field">
                <label for="eventDate">Ημερομηνία Διεξαγωγής</label>
                <input type="date" id="eventDate">
            </div>
        </div>

        <!-- ΕΝΟΤΗΤΑ ΕΡΓΑΣΙΑΣ  -->
        <div id="jobFields" style="display: none;">
            <div class="section-title">Στοιχεία Θέσης Εργασίας</div>
            <div class="field-group">
                <div class="field">
                    <label>Τοποθεσία</label>
                    <input type="text" id="location" placeholder="π.χ. Αθήνα (Remote)">
                </div>
                <div class="field">
                    <label>Τύπος Απασχόλησης</label>
                    <select id="jobType">
                        <option value="full">Full-time</option>
                        <option value="intern">Internship</option>
                        <option value="part">Part-time</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Περιγραφή (Κοινό πεδίο που εμφανίζεται μετά την επιλογή τύπου) -->
        <div id="commonDescription" style="display: none;">
            <div class="field">
                <label for="desc">Περιγραφή & Σημειώσεις</label>
                <textarea id="desc" rows="4" placeholder="Περιγράψτε το αίτημά σας..."></textarea>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="button" class="btn btn-outline-light flex-grow-1" onclick="saveDraft()">Αποθήκευση Προσχεδίου</button>
                <button type="button" class="btn btn-primary flex-grow-1" onclick="submitForm()">Υποβολή</button>
            </div>
        </div>

        <!-- Οθόνη Επιτυχίας -->
        <div class="success-screen" id="successMsg">
            <h2 class="text-success">Επιτυχία!</h2>
            <p>Το αίτημα στάλθηκε στο τμήμα Partnerships της Unistudents.</p>
        </div>
    </form>
</div>

<script src="js/script.js"></script>
<footer class="footer">
  <p>UniStudents Project © 2026</p>
</footer>
</body>
</html>
