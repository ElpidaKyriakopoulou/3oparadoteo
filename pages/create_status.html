<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Δημιουργία Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">
</head>

<body data-page="create_status">
  <div class="container py-5">
    <h1 class="mb-4">Δημιουργία Status Αιτήματος</h1>

    <div class="table-container">
      <h3 id="companyName"></h3>

      <p class="text-white-50">
        Δημιουργία αρχικής κατάστασης για το αίτημα.
      </p>

      <hr class="border-secondary">

      <p><strong>Τύπος:</strong> <span id="requestType"></span></p>
      <p><strong>Ημερομηνία:</strong> <span id="requestDate"></span></p>
      <p><strong>Email:</strong> <span id="requestEmail"></span></p>

      <p><strong>Περιγραφή αιτήματος:</strong></p>
      <p id="requestDescription"></p>

      <hr class="border-secondary">

      <div class="field mt-4">
        <label for="initialStatus">Αρχικό Status</label>
        <select id="initialStatus">
          <option value="">-- Επιλογή αρχικού status --</option>
          <option value="Προς Έγκριση">Προς Έγκριση</option>
          <option value="Σε Επεξεργασία">Σε Επεξεργασία</option>
          <option value="Χρειάζονται αλλαγές">Χρειάζονται αλλαγές</option>
        </select>
      </div>

      <div class="field mt-4">
        <label for="initialComment">Αρχικό σχόλιο</label>
        <textarea id="initialComment" rows="4"></textarea>
      </div>

      <button class="btn btn-primary mt-4" onclick="createStatus()">
        Δημιουργία Status
      </button>

      <a href="kentriki.html" class="btn btn-outline-light mt-4 ms-2">
        Ακύρωση
      </a>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
